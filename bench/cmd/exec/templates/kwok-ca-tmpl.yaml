apiVersion: config.kwok.x-k8s.io/v1alpha1
kind: KwokctlConfiguration
options:
  runtime: docker # kind
  kubeVersion: v1.34.0
  disableKubeControllerManager: true
  manageAllNodes: true
  kubeSchedulerConfig: {{.KubeSchedulerConfigPath}}
componentsPatches:
  - name: kube-apiserver
    extraArgs:
    - key: disable-admission-plugins
      value: "TaintNodesByCondition"
  - name: kube-scheduler
    extraArgs:
    - key: v
      value: "6"
components:
  - name: {{.ContainerName}}
    image: gcr.io/k8s-staging-autoscaling/cluster-autoscaler-arm64:{{.ImageTag}}
    command:
      - /cluster-autoscaler
    args:
      - --v=4
      - --leader-elect=false
      - --cloud-provider=kwok
      - --kubeconfig=/etc/kubeconfig/kubeconfig
    envs:
      - name: KUBERNETES_SERVICE_HOST
        value: "127.0.0.1"
      - name: KUBERNETES_SERVICE_PORT
        value: "32766" #"6443"
      - name: KWOK_PROVIDER_MODE
        value: "local"
      - name: POD_NAMESPACE
        value: "default"
      - name: KUBECONFIG
        value: "/etc/kubeconfig/kubeconfig"
    volumes:
      - hostPath: "{{.HomeDir}}/.kwok/clusters/{{.ClusterName}}/kubeconfig"
        mountPath: /etc/kubeconfig/kubeconfig
        readOnly: true
      - hostPath: "{{.HomeDir}}/.kwok/clusters/{{.ClusterName}}/pki"
        mountPath: /etc/kubernetes/pki
        readOnly: true
    networks:
      - kwok-{{.ClusterName}}
  - name: prometheus
    image: {{.PrometheusImage}}
    ports:
      - port: 9090
        hostPort: 9090
    volumes:
      - hostPath: "{{.PrometheusConfigPath}}"
        mountPath: /etc/prometheus/prometheus.yml
        readOnly: true
    networks:
      - kwok-{{.ClusterName}}
