apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: ebs.csi.aws.com
  name: "{{.Name}}"
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: "{{.PVCName}}"
    namespace: "{{.Namespace}}"
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-0488c6cc3dc73dbe4
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - "{{.Zone}}"
  persistentVolumeReclaimPolicy: Delete
  storageClassName: default
  volumeMode: Filesystem
