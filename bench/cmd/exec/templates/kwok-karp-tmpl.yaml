apiVersion: config.kwok.x-k8s.io/v1alpha1
kind: KwokctlConfiguration
options:
  runtime: docker # kind
  kubeVersion: v1.34.0
  disableKubeControllerManager: true
  manageAllNodes: true
  kubeSchedulerConfig: {{.KubeSchedulerConfigPath}}
componentsPatches:
  - name: kube-apiserver
    extraArgs:
    - key: disable-admission-plugins
      value: "TaintNodesByCondition"
  - name: kube-scheduler
    extraArgs:
    - key: v
      value: "6"
components:
  - name: karpenter
    image: karpenter.local/kwok:{{.ImageTag}}
    command:
      - /kwok-bin
    envs:
      - name: KIND_CLUSTER_NAME
        value: "kar-kwok-test"
      - name: KWOK_PROVIDER_MODE
        value: "local"
      - name: KUBECONFIG
        value: "/etc/kubeconfig/kubeconfig"
      - name: INSTANCE_TYPES_FILE_PATH
        value: "/etc/instance_types.json"
      - name: DISABLE_LEADER_ELECTION
        value: "true"
    volumes:
      - hostPath: {{.HomeDir}}/.kwok/clusters/{{.ClusterName}}/kubeconfig
        mountPath: /etc/kubeconfig/kubeconfig
        readOnly: true
      - hostPath: {{.HomeDir}}/.kwok/clusters/{{.ClusterName}}/pki
        mountPath: /etc/kubernetes/pki
        readOnly: true
      - hostPath: {{.ScenarioDirectory}}/instance_types.json
        mountPath: /etc/instance_types.json
        readOnly: true
    networks:
      - kwok-{{.ClusterName}}
