apiVersion: sa.gardener.cloud/v1alpha1
kind: ScalingConstraint
metadata:
  name: two-pool
  namespace: default
spec:
  nodePools:
    - availabilityZones:
        - eu-west-1a
      labels:
        kubernetes.io/arch: amd64
        networking.gardener.cloud/node-local-dns-enabled: "true"
        node.kubernetes.io/role: node
        worker.garden.sapcloud.io/group: p
        worker.gardener.cloud/cri-name: containerd
        worker.gardener.cloud/pool: p
        worker.gardener.cloud/system-components: "true"
      name: a
      nodeTemplates:
        - architecture: amd64
          capacity:
            cpu: "2"
            gpu: "0"
            memory: 8Gi
          instanceType: m5.large
          kubeReservedCapacity:
            cpu: 80m
            memory: 1Gi
            pid: 20k
          name: m5l
          priority: 0
      priority: 1
      region: eu-west-1
    - availabilityZones:
        - eu-west-1a
      labels:
        kubernetes.io/arch: amd64
        networking.gardener.cloud/node-local-dns-enabled: "true"
        node.kubernetes.io/role: node
        worker.garden.sapcloud.io/group: q
        worker.gardener.cloud/cri-name: containerd
        worker.gardener.cloud/pool: q
      name: b
      nodeTemplates:
        - architecture: amd64
          capacity:
            cpu: "4"
            gpu: "0"
            memory: 16Gi
          instanceType: m5.xlarge
          kubeReservedCapacity:
            cpu: 80m
            memory: 1Gi
            pid: 20k
          name: m5xl
          priority: 0
      priority: 0
      region: eu-west-1